project:
  type: website
  output-dir: _site
  resources:
  - "*.ipynb"
  post-render: copy_output.py
website:
  title: "Jesse Anderson's Blog"
  open-graph: true
  google-analytics: "G-5CSPYCMY55"
  cookie-consent:
    type: express
    style: simple
    palette: light
  navbar:
    right:
      - archive.qmd
      - about.qmd
      - icon: house
        text: Main Site
        href: https://jesse-anderson.net/
      - icon: folder-symlink-fill
        text: Portfolio
        href: https://portfolio.jesse-anderson.net/
      - icon: tools
        text: Tools
        href: https://tools.jesse-anderson.net/
      - icon: github
        href: https://github.com/jesse-anderson/
      - icon: linkedin
        href: https://www.linkedin.com/in/jesse-anderson-a7c5/


format:
  html:
    theme: cosmo
    css: styles.css
    grid:
      sidebar-width: 100px
      body-width: 1100px
      margin-width: 200px
      gutter-width: 1.5rem

# Ensure that code is always executed and not frozen
execute:
  freeze: false