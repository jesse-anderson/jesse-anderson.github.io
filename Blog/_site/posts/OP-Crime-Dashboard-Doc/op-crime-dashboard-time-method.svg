<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="700" viewBox="0 0 1280 700" role="img" aria-labelledby="title desc">
  <title id="title">Time range handling and holiday denominator logic</title>
  <desc id="desc">The dashboard treats police report time ranges as intervals rather than points. Hourly profiles spread weight across touched hours, while holiday comparisons count calendar days first and then compare mean incidents per holiday day against a non-holiday weekday baseline.</desc>
  <defs>
    <style>
      .bg { fill: #f8fafc; }
      .lane { fill: #ffffff; stroke: #e2e8f0; stroke-width: 1.5; rx: 12; }
      .box { fill: #ffffff; stroke: #cbd5e1; stroke-width: 2; rx: 8; }
      .input { fill: #eef2ff; stroke: #818cf8; }
      .time { fill: #ecfeff; stroke: #06b6d4; }
      .calc { fill: #fef3c7; stroke: #f59e0b; }
      .out { fill: #dcfce7; stroke: #22c55e; }
      .warn { fill: #fff7ed; stroke: #fdba74; }
      .title { font: 700 23px system-ui, -apple-system, Segoe UI, sans-serif; fill: #111827; }
      .laneTitle { font: 700 13px system-ui, -apple-system, Segoe UI, sans-serif; fill: #64748b; text-transform: uppercase; letter-spacing: .06em; }
      .label { font: 700 14px system-ui, -apple-system, Segoe UI, sans-serif; fill: #111827; }
      .small { font: 12px system-ui, -apple-system, Segoe UI, sans-serif; fill: #475569; }
      .note { font: 12px system-ui, -apple-system, Segoe UI, sans-serif; fill: #64748b; }
      .arrow { stroke: #475569; stroke-width: 2.3; fill: none; marker-end: url(#head); }
      .softArrow { stroke: #94a3b8; stroke-width: 2; fill: none; marker-end: url(#softHead); }
      .tick { stroke: #94a3b8; stroke-width: 1.5; }
      .bar { fill: #38bdf8; opacity: .55; }
      .holiday { fill: #f59e0b; opacity: .6; }
      .baseline { fill: #22c55e; opacity: .55; }
    </style>
    <marker id="head" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#475569"/>
    </marker>
    <marker id="softHead" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#94a3b8"/>
    </marker>
  </defs>

  <rect class="bg" width="1280" height="700"/>
  <text class="title" x="48" y="52">Time handling: ranges stay ranges, rates use day denominators</text>
  <text class="note" x="48" y="78">The dashboard tries not to turn uncertain timing into precise-looking chart spikes.</text>

  <rect class="lane" x="40" y="112" width="1200" height="220"/>
  <text class="laneTitle" x="64" y="142">Interval weighting for hour and day-of-week profiles</text>

  <rect class="box input" x="75" y="190" width="175" height="76"/>
  <text class="label" x="98" y="220">Report time range</text>
  <text class="small" x="98" y="242">1800-0600 HRS</text>

  <rect class="box time" x="320" y="170" width="220" height="116"/>
  <text class="label" x="344" y="200">Keep interval fields</text>
  <text class="small" x="344" y="224">start = 18:00</text>
  <text class="small" x="344" y="244">end = 06:00 next day</text>
  <text class="small" x="344" y="264">duration = 12 hours</text>

  <rect class="box calc" x="610" y="170" width="255" height="116"/>
  <text class="label" x="634" y="200">Spread one incident</text>
  <text class="small" x="634" y="224">Each touched hour gets</text>
  <text class="small" x="634" y="244">1 / duration weight</text>
  <text class="small" x="634" y="264">instead of a full count</text>

  <rect class="box out" x="935" y="170" width="220" height="116"/>
  <text class="label" x="959" y="200">Time panels</text>
  <text class="small" x="959" y="224">hour x day heatmap</text>
  <text class="small" x="959" y="244">darkness share</text>
  <text class="small" x="959" y="264">seasonal profiles</text>

  <path class="arrow" d="M250 228 H320"/>
  <path class="arrow" d="M540 228 H610"/>
  <path class="arrow" d="M865 228 H935"/>

  <line class="tick" x1="335" y1="302" x2="845" y2="302"/>
  <text class="note" x="330" y="318">18</text>
  <text class="note" x="476" y="318">22</text>
  <text class="note" x="622" y="318">02</text>
  <text class="note" x="768" y="318">06</text>
  <rect class="bar" x="355" y="292" width="470" height="20" rx="4"/>
  <text class="note" x="910" y="307">fractional weight across the whole reported window</text>

  <rect class="lane" x="40" y="368" width="1200" height="270"/>
  <text class="laneTitle" x="64" y="398">Holiday comparison denominator</text>

  <rect class="box input" x="75" y="470" width="165" height="72"/>
  <text class="label" x="98" y="500">Calendar days</text>
  <text class="small" x="98" y="522">holiday flags</text>

  <rect class="box calc" x="310" y="430" width="190" height="72"/>
  <text class="label" x="334" y="460">Holiday days</text>
  <text class="small" x="334" y="482">recognized holiday dates</text>

  <rect class="box calc" x="310" y="540" width="190" height="72"/>
  <text class="label" x="334" y="570">Baseline days</text>
  <text class="small" x="334" y="592">clean non-holiday weekdays</text>

  <rect class="box calc" x="575" y="430" width="220" height="72"/>
  <text class="label" x="599" y="460">Holiday rate</text>
  <rect class="holiday" x="599" y="475" width="55" height="14" rx="3"/>
  <text class="small" x="664" y="488">incidents / holiday days</text>

  <rect class="box calc" x="575" y="540" width="220" height="72"/>
  <text class="label" x="599" y="570">Baseline rate</text>
  <rect class="baseline" x="599" y="585" width="55" height="14" rx="3"/>
  <text class="small" x="664" y="598">incidents / baseline days</text>

  <rect class="box out" x="895" y="485" width="230" height="72"/>
  <text class="label" x="919" y="515">Compare means</text>
  <text class="small" x="919" y="537">holiday day rate vs baseline</text>

  <path class="arrow" d="M240 506 C270 506, 270 466, 310 466"/>
  <path class="arrow" d="M240 506 C270 506, 270 576, 310 576"/>
  <path class="arrow" d="M500 466 H575"/>
  <path class="arrow" d="M500 576 H575"/>
  <path class="arrow" d="M795 466 C840 466, 850 521, 895 521"/>
  <path class="arrow" d="M795 576 C840 576, 850 521, 895 521"/>

  <text class="note" x="75" y="666">The comparison is mean incidents per calendar day, not records with a holiday flag divided by records without one.</text>
</svg>
