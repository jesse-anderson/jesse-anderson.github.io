<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760" role="img" aria-labelledby="title desc">
  <title id="title">Narrative NLP, topics, search, and similarity flow</title>
  <desc id="desc">Narratives are normalized once, then split into a search path and a model path. The BGE embeddings output is repeated as the input to separate topic modeling and similarity lanes so each process can be read left to right.</desc>
  <defs>
    <style>
      .bg { fill: #f8fafc; }
      .lane { fill: #ffffff; stroke: #e2e8f0; stroke-width: 1.5; rx: 12; }
      .box { fill: #ffffff; stroke: #cbd5e1; stroke-width: 2; rx: 8; }
      .public { fill: #eef2ff; stroke: #818cf8; }
      .private { fill: #fff7ed; stroke: #fdba74; }
      .model { fill: #fef3c7; stroke: #f59e0b; }
      .search { fill: #ecfeff; stroke: #06b6d4; }
      .output { fill: #dcfce7; stroke: #22c55e; }
      .title { font: 700 23px system-ui, -apple-system, Segoe UI, sans-serif; fill: #111827; }
      .laneTitle { font: 700 13px system-ui, -apple-system, Segoe UI, sans-serif; fill: #64748b; text-transform: uppercase; letter-spacing: .06em; }
      .label { font: 700 13px system-ui, -apple-system, Segoe UI, sans-serif; fill: #111827; }
      .small { font: 12px system-ui, -apple-system, Segoe UI, sans-serif; fill: #475569; }
      .note { font: 12px system-ui, -apple-system, Segoe UI, sans-serif; fill: #64748b; }
      .arrow { stroke: #475569; stroke-width: 2.3; fill: none; marker-end: url(#head); }
      .publicArrow { stroke: #4f46e5; stroke-width: 2.3; fill: none; marker-end: url(#publicHead); }
      .privateArrow { stroke: #c2410c; stroke-width: 2.3; fill: none; marker-end: url(#privateHead); }
    </style>
    <marker id="head" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#475569"/>
    </marker>
    <marker id="publicHead" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#4f46e5"/>
    </marker>
    <marker id="privateHead" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#c2410c"/>
    </marker>
  </defs>

  <rect class="bg" width="1280" height="760"/>
  <text class="title" x="48" y="52">Narrative pipeline: search, topics, and similarity</text>
  <text class="note" x="48" y="78">BGE embeddings are shown as branch inputs below so each process can stay readable left to right.</text>

  <rect class="lane" x="40" y="105" width="1200" height="210"/>
  <text class="laneTitle" x="64" y="134">Text preparation and search</text>

  <rect class="box public" x="70" y="172" width="155" height="72"/>
  <text class="label" x="92" y="202">crime_details</text>
  <text class="small" x="92" y="224">source narratives</text>

  <rect class="box" x="275" y="172" width="145" height="72"/>
  <text class="label" x="297" y="202">normalize</text>
  <text class="small" x="297" y="224">stable text fields</text>

  <rect class="box public" x="470" y="140" width="165" height="72"/>
  <text class="label" x="492" y="170">narrative_norm</text>
  <text class="small" x="492" y="192">display/search text</text>

  <rect class="box private" x="470" y="232" width="165" height="62"/>
  <text class="label" x="492" y="258">model input</text>
  <text class="small" x="492" y="280">private artifact</text>

  <rect class="box search" x="700" y="140" width="145" height="72"/>
  <text class="label" x="722" y="170">BM25 index</text>
  <text class="small" x="722" y="192">browser search</text>

  <rect class="box output" x="910" y="140" width="145" height="72"/>
  <text class="label" x="932" y="170">Search page</text>
  <text class="small" x="932" y="192">WASM scorer</text>

  <rect class="box model" x="700" y="232" width="145" height="62"/>
  <text class="label" x="722" y="258">BGE embeddings</text>
  <text class="small" x="722" y="280">fp32 private cache</text>

  <path class="arrow" d="M225 208 H275"/>
  <path class="publicArrow" d="M420 194 C445 194, 445 176, 470 176"/>
  <path class="privateArrow" d="M420 220 C445 220, 445 263, 470 263"/>
  <path class="publicArrow" d="M635 176 H700"/>
  <path class="publicArrow" d="M845 176 H910"/>
  <path class="privateArrow" d="M635 263 H700"/>

  <rect class="lane" x="40" y="350" width="1200" height="160"/>
  <text class="laneTitle" x="64" y="379">Topic modeling branch</text>

  <rect class="box model" x="70" y="412" width="145" height="60"/>
  <text class="label" x="92" y="438">BGE embeddings</text>
  <text class="small" x="92" y="458">vector input</text>

  <rect class="box model" x="265" y="412" width="125" height="60"/>
  <text class="label" x="287" y="438">UMAP</text>
  <text class="small" x="287" y="458">local structure</text>

  <rect class="box model" x="440" y="412" width="125" height="60"/>
  <text class="label" x="462" y="438">HDBSCAN</text>
  <text class="small" x="462" y="458">clusters</text>

  <rect class="box model" x="615" y="412" width="125" height="60"/>
  <text class="label" x="637" y="438">c-TF-IDF</text>
  <text class="small" x="637" y="458">topic words</text>

  <rect class="box private" x="790" y="412" width="125" height="60"/>
  <text class="label" x="812" y="438">draft labels</text>
  <text class="small" x="812" y="458">private audit</text>

  <rect class="box public" x="965" y="412" width="125" height="60"/>
  <text class="label" x="987" y="438">curated labels</text>
  <text class="small" x="987" y="458">public words</text>

  <rect class="box output" x="1140" y="412" width="80" height="60"/>
  <text class="label" x="1157" y="438">Topics</text>
  <text class="small" x="1155" y="458">page</text>

  <path class="privateArrow" d="M215 442 H265"/>
  <path class="privateArrow" d="M390 442 H440"/>
  <path class="privateArrow" d="M565 442 H615"/>
  <path class="privateArrow" d="M740 442 H790"/>
  <path class="publicArrow" d="M915 442 H965"/>
  <path class="publicArrow" d="M1090 442 H1140"/>

  <rect class="lane" x="40" y="545" width="1200" height="140"/>
  <text class="laneTitle" x="64" y="574">Similarity branch</text>

  <rect class="box model" x="180" y="610" width="160" height="58"/>
  <text class="label" x="202" y="635">BGE embeddings</text>
  <text class="small" x="202" y="654">vector input</text>

  <rect class="box model" x="430" y="610" width="160" height="58"/>
  <text class="label" x="452" y="635">quantized vectors</text>
  <text class="small" x="452" y="654">int8 browser copy</text>

  <rect class="box model" x="680" y="610" width="160" height="58"/>
  <text class="label" x="702" y="635">similarity artifacts</text>
  <text class="small" x="702" y="654">vectors + metadata</text>

  <rect class="box output" x="930" y="610" width="160" height="58"/>
  <text class="label" x="952" y="635">Incident page</text>
  <text class="small" x="952" y="654">neighbors + anti</text>

  <path class="publicArrow" d="M340 639 H430"/>
  <path class="publicArrow" d="M590 639 H680"/>
  <path class="publicArrow" d="M840 639 H930"/>

  <text class="note" x="60" y="725">Private artifacts support fitting and review. Public artifacts are curated topic data, search payloads, quantized vectors, metadata, WASM, and source-linked samples.</text>
</svg>
