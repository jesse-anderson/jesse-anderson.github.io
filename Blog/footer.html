<script>
    function generateNonce(length = 16) {
        const possible = "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789";
        let text = "";
        for (let i = 0; i < length; i++) {
            text += possible.charAt(Math.floor(Math.random() * possible.length));
        }
        return text;
    }

    document.addEventListener('DOMContentLoaded', function() {
        const facebookSDKScript = document.getElementById('facebook-jssdk');
        if (facebookSDKScript) {
            facebookSDKScript.setAttribute('nonce', generateNonce());
        }

        const currentUrl = window.location.href;
        const currentTitle = document.title;

        document.querySelectorAll('script[type="IN/Share"]').forEach(elem => {
            elem.setAttribute('data-url', currentUrl);
        });

        const facebookButton = document.querySelector('.fb-share-button');
        if (facebookButton) {
            facebookButton.setAttribute('data-href', currentUrl);
        }

        const twitterButton = document.querySelector('.twitter-share-button');
        if (twitterButton) {
            twitterButton.setAttribute('href', 'https://twitter.com/share?url=' + encodeURIComponent(currentUrl) + '&hashtags=rstats');
        }

        const emailButton = document.querySelector('.email-share-button');
        if (emailButton) {
            emailButton.setAttribute('href', `mailto:?subject=${encodeURIComponent(currentTitle)}&body=Check out this link: ${encodeURIComponent(currentUrl)}`);
        }

        const copyrightYear = document.getElementById('copyright-year');
        if (copyrightYear) {
            copyrightYear.textContent = new Date().getFullYear();
        }
    });
</script>
